<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const slug = window.location.pathname.split('/').filter(Boolean).pop();
    if (slug && slug !== 'article' && slug !== '404') {
      window.location.replace('/articles/article.html?slug=' + encodeURIComponent(slug));
    }
  </script>
</head>
<body></body>
</html>
