<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);

    if (parts[0] === 'projects' && parts[1] && parts[1] !== 'project-item.html') {
      window.location.replace('/projects/project-item.html?slug=' + encodeURIComponent(parts[1]));
    } else if (parts[0] === 'articles' && parts[1] && parts[1] !== 'article.html') {
      window.location.replace('/articles/article.html?slug=' + encodeURIComponent(parts[1]));
    } else if (parts[0] === 'research' && parts[1] && parts[1] !== 'research-item.html') {
      window.location.replace('/research/research-item.html?slug=' + encodeURIComponent(parts[1]));
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
