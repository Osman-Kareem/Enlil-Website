<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const slug = window.location.pathname.split('/').filter(Boolean).pop();
    if (slug && slug !== 'research-item' && slug !== '404') {
      window.location.replace('/research/research-item.html?slug=' + encodeURIComponent(slug));
    }
  </script>
</head>
<body></body>
</html>
