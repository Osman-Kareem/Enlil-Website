<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlil Center - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <style>
        .ql-editor { min-height: 420px; font-size: 1.1rem; line-height: 1.7; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-[10000]">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 p-10">
        <div class="flex justify-center mb-6">
            <i class="fa-solid fa-leaf text-5xl text-emerald-600"></i>
        </div>
        <h2 class="text-3xl font-semibold text-center mb-2">Enlil Center Admin</h2>
        <p class="text-center text-gray-500 mb-8">Enter your credentials</p>
        
        <input type="text" id="loginUsername" placeholder="Username"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4 text-lg">
        
        <input type="password" id="loginPassword" placeholder="Password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6 text-lg">
        
        <button onclick="attemptLogin()" 
                class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium text-lg hover:bg-emerald-700">
            Login
        </button>
        
        <p id="loginError" class="text-red-500 text-center mt-4 hidden">Wrong username or password</p>
    </div>
</div>
    
<div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-white shadow-2xl p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <i class="fa-solid fa-leaf text-4xl text-emerald-600"></i>
            <h1 class="text-3xl font-semibold">Enlil Center</h1>
        </div>
        <nav class="flex-1 space-y-1">
            <button onclick="switchTab(0)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg tab-active">👤 Authors</button>
            <button onclick="switchTab(1)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📰 Articles & News</button>
            <button onclick="switchTab(2)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📚 Research & Reports</button>
            <button onclick="switchTab(3)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📋 Projects</button>
            <button onclick="switchTab(4)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">🤝 Partners & Sponsors</button>
            <button onclick="logout(5)" class="w-full text-left px-6 py-4 rounded-2xl hover:bg-red-50 flex items-center gap-3 text-lg text-red-600 mt-auto">🚪 Logout</button>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10 overflow-auto">

        <!-- Authors -->
        <div id="tab0" class="tab-content">
            <h2 class="text-3xl font-semibold mb-8">Authors</h2>
            <form id="authorForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="block text-sm font-medium mb-2">Full Name</label><input type="text" id="authorName" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" required></div>
                    <div><label class="block text-sm font-medium mb-2">Photo</label><input type="file" id="authorPhoto" accept="image/*" class="w-full"></div>
                </div>
                <div class="mt-6"><label class="block text-sm font-medium mb-2">Bio</label><textarea id="authorBio" rows="4" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></textarea></div>
                <div class="grid grid-cols-3 gap-6 mt-6">
                    <div><label class="block text-sm font-medium mb-2">Email</label><input type="email" id="authorEmail" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                    <div><label class="block text-sm font-medium mb-2">LinkedIn</label><input type="url" id="authorLinkedIn" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                    <div><label class="block text-sm font-medium mb-2">X (Twitter)</label><input type="url" id="authorX" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                </div>
                <div class="mt-6"><label class="block text-sm font-medium mb-2">Website</label><input type="url" id="authorWebsite" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Author</button>
            </form>
            <div id="authorsList"></div>
        </div>

        <!-- Articles & News -->
        <div id="tab1" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Articles & News</h2>
            <form id="articleForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <input type="text" id="articleTitle" placeholder="Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <select id="articleAuthor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6"></select>
                <input type="file" id="articleCover" accept="image/*" class="mb-6">
                <div id="articleCoverPreview" class="mt-4 hidden"><img id="articlePreviewImg" class="max-h-64 rounded-2xl"></div>
                <div id="articleEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Article</button>
            </form>
            <div id="articlesList"></div>
        </div>

        <!-- Research & Reports -->
        <div id="tab2" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Research & Reports</h2>
            <form id="researchForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <input type="text" id="researchTitle" placeholder="Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <select id="researchAuthor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6"></select>
                <input type="file" id="researchCover" accept="image/*" class="mb-6">
                <div id="researchCoverPreview" class="mt-4 hidden"><img id="researchPreviewImg" class="max-h-64 rounded-2xl"></div>
                <input type="file" id="researchPDF" accept="application/pdf" class="mb-6">
                <div id="researchPDFPreview" class="mt-4 hidden"><img id="researchPDFThumb" class="max-h-48 rounded-2xl"></div>
                <div id="researchEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Research</button>
            </form>
            <div id="researchList"></div>
        </div>

        <!-- Projects -->
        <div id="tab3" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Projects</h2>
            <form id="projectForm" class="bg-white p-8 rounded-3xl shadow">
                <input type="text" id="projectTitle" placeholder="Project Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <input type="text" id="projectSponsor" placeholder="Funded by / Sponsor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <div id="projectEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Project</button>
            </form>
            <div id="projectsList"></div>
        </div>

        <!-- Partners & Sponsors -->
        <div id="tab4" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Partners & Sponsors</h2>
            <form id="partnerForm" class="bg-white p-8 rounded-3xl shadow">
                <input type="text" id="partnerName" placeholder="Organization Name" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <input type="url" id="partnerUrl" placeholder="Website URL" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <input type="file" id="partnerLogo" accept="image/*" class="mb-6">
                <button type="submit" class="mt-8 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Partner</button>
            </form>
            <div id="partnersList"></div>
        </div>
    </div>
        <!-- Crop Modal -->
<div id="cropModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full mx-4 overflow-hidden">
        <div class="p-6 border-b flex items-center justify-between">
            <h3 class="text-2xl font-semibold" id="cropTitle">Crop Image</h3>
            <button onclick="cancelCrop()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        <div class="p-8">
            <img id="cropImage" class="max-h-[460px] w-full object-contain mx-auto">
        </div>
        <div class="p-6 bg-gray-50 flex items-center justify-end gap-4">
            <button onclick="cancelCrop()" 
                    class="px-8 py-4 text-lg font-medium text-gray-600 hover:bg-gray-100 rounded-2xl">
                Cancel
            </button>
            <button onclick="applyCrop()" 
                    class="px-10 py-4 text-lg font-medium bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700">
                Crop & Compress
            </button>
        </div>
    </div>
</div>


</div>



<script>
    const API_BASE = "https://enlil-cms-api.osmanalikareem.workers.dev";

    // ====================== LOGIN ======================
    const VALID_USERNAME = "admin";
    const VALID_PASSWORD_HASH = "4e2f51b1f6ff8ab433eb869bddf1a9bb89a9073f85e30f4d0c4fc41aa33bb8de";

    let isLoggedIn = false;

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');
    }

    async function attemptLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showLoginError("Please fill both fields");
            return;
        }
        if (username !== VALID_USERNAME) {
            showLoginError();
            return;
        }
        const inputHash = await hashPassword(password);
        if (inputHash === VALID_PASSWORD_HASH) {
            isLoggedIn = true;
            localStorage.setItem('enlilAdminLoggedIn', 'true');
            document.getElementById('loginScreen').classList.add('hidden');
        } else {
            showLoginError();
        }
    }

    function showLoginError(msg = "Wrong username or password") {
        const err = document.getElementById('loginError');
        err.textContent = msg;
        err.classList.remove('hidden');
        setTimeout(() => err.classList.add('hidden'), 3000);
    }

    function logout() {
        if (confirm('Logout and return to login screen?')) {
            isLoggedIn = false;
            localStorage.removeItem('enlilAdminLoggedIn');
            document.getElementById('loginScreen').classList.remove('hidden');
            articles = research = projects = partners = authors = [];
        }
    }

    // ====================== TAB SWITCHING ======================
    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab' + n).classList.remove('hidden');

        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('tab-active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-button')).find(btn => 
            parseInt(btn.getAttribute('onclick').match(/\d+/)) === n);
        if (activeBtn) activeBtn.classList.add('tab-active');
    }

    // ====================== QUILL EDITORS ======================
    let quillArticle, quillResearch, quillProject;

    function initEditors() {
        quillArticle = new Quill('#articleEditor', {
            theme: 'snow',
            modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] }
        });
        quillResearch = new Quill('#researchEditor', {
            theme: 'snow',
            modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] }
        });
        quillProject = new Quill('#projectEditor', {
            theme: 'snow',
            modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] }
        });
    }

    // ====================== CROP & COMPRESS ======================
    let currentCropper = null;
    let currentInputId = null;
    let currentAspectRatio = 1;
    let currentMaxKB = 1500;

    const IMAGE_CONFIG = {
        authorPhoto:   { aspect: 1,     maxWidth: 800,  maxKB: 600 },
        articleCover:  { aspect: 16/9,  maxWidth: 1200, maxKB: 1500 },
        researchCover: { aspect: 16/9,  maxWidth: 1200, maxKB: 1500 },
        partnerLogo:   { aspect: 1,     maxWidth: 600,  maxKB: 500 }
    };

    function handleImageSelect(e, configKey) {
        const file = e.target.files[0];
        if (!file) return;

        const config = IMAGE_CONFIG[configKey];
        currentInputId = e.target.id;
        currentAspectRatio = config.aspect;
        currentMaxKB = config.maxKB;

        document.getElementById('cropModal').classList.remove('hidden');
        document.getElementById('cropTitle').textContent = 
            (configKey.includes('author') || configKey.includes('partner')) ? "Crop square image" : "Crop landscape cover";

        const reader = new FileReader();
        reader.onload = ev => {
            const img = document.getElementById('cropImage');
            img.src = ev.target.result;
            if (currentCropper) currentCropper.destroy();
            currentCropper = new Cropper(img, {
                aspectRatio: currentAspectRatio,
                viewMode: 2,
                autoCropArea: 1
            });
        };
        reader.readAsDataURL(file);
    }

    function cancelCrop() {
        if (currentCropper) currentCropper.destroy();
        currentCropper = null;
        document.getElementById('cropModal').classList.add('hidden');
        if (currentInputId) document.getElementById(currentInputId).value = '';
    }

    async function applyCrop() {
        if (!currentCropper) return;
        const canvas = currentCropper.getCroppedCanvas({ width: IMAGE_CONFIG[currentInputId]?.maxWidth || 1200 });
        let base64 = canvas.toDataURL('image/jpeg', 0.92);
        base64 = await compressImage(base64, currentMaxKB);

        window[`cropped_${currentInputId}`] = base64;

        if (currentCropper) currentCropper.destroy();
        currentCropper = null;
        document.getElementById('cropModal').classList.add('hidden');

        // Show preview
        const previewId = currentInputId.replace('Cover', 'CoverPreview').replace('Logo', 'Preview').replace('Photo', 'PhotoPreview');
        const imgId = currentInputId.replace('Cover', 'PreviewImg').replace('Logo', 'PreviewImg').replace('Photo', 'PhotoPreviewImg');
        if (document.getElementById(imgId)) {
            document.getElementById(imgId).src = base64;
            document.getElementById(previewId).classList.remove('hidden');
        }
        alert('✅ Image cropped & compressed!');
    }

    async function compressImage(base64, maxKB) {
        let quality = 0.92;
        let result = base64;
        while (result.length / 1024 > maxKB && quality > 0.1) {
            quality -= 0.05;
            const img = new Image();
            img.src = base64;
            await new Promise(r => img.onload = r);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            result = canvas.toDataURL('image/jpeg', quality);
        }
        return result;
    }

    // ====================== DATA LOAD / SAVE ======================
    let articles = [], research = [], projects = [], partners = [], authors = [];

    async function loadFromFiles() {
        try {
            const [aRes, rRes, pRes, prRes, paRes] = await Promise.all([
                fetch(`${API_BASE}/data/authors`),
                fetch(`${API_BASE}/data/articles`),
                fetch(`${API_BASE}/data/research`),
                fetch(`${API_BASE}/data/projects`),
                fetch(`${API_BASE}/data/partners`)
            ]);
            authors = await aRes.json() || [];
            articles = await rRes.json() || [];
            research = await pRes.json() || [];
            projects = await prRes.json() || [];
            partners = await paRes.json() || [];
        } catch(e) { console.log("First run - no data yet"); }
        renderAll();
    }

    async function saveToJSON(filename, data) {
        const key = filename.replace('data/', '').replace('.json', '');
        try {
            await fetch(`${API_BASE}/data/${key}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            console.log(`✅ ${key} saved`);
        } catch(e) {
            console.error("Save failed", e);
            alert("Could not save — check console");
        }
    }

    // ====================== RENDER FUNCTIONS (keep your existing ones) ======================
    function renderAll() {
        renderAuthors();
        renderArticles();
        renderResearch();
        renderProjects();
        renderPartners();
    }

    function renderAuthors() {
        const container = document.getElementById('authorsList');
        container.innerHTML = authors.map(a => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    ${a.photo ? `<img src="${a.photo}" class="w-10 h-10 rounded-xl object-cover">` : ''}
                    <div>
                        <p class="font-semibold">${a.name}</p>
                        <p class="text-xs text-gray-500">${a.email || ''}</p>
                    </div>
                </div>
                <button onclick="deleteItem('authors', '${a.id || a.name}')" class="text-red-500 hover:text-red-600 text-2xl">×</button>
            </div>
        `).join('');
    }
    
    function renderArticles() {
        const container = document.getElementById('articlesList');
        container.innerHTML = articles.map((a, index) => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center">
                <div>
                    <p class="font-semibold">${a.title}</p>
                    <p class="text-xs text-gray-500">By ${a.author || '—'}</p>
                </div>
                <button onclick="deleteItem('articles', ${index})" class="text-red-500 hover:text-red-600 text-2xl">×</button>
            </div>
        `).join('');
    }
    

    function renderResearch() {
        const container = document.getElementById('researchList');
        container.innerHTML = research.map((r, index) => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center">
                <div>
                    <p class="font-semibold">${r.title}</p>
                    <p class="text-xs text-gray-500">By ${r.author || '—'}</p>
                </div>
                <button onclick="deleteItem('research', ${index})" class="text-red-500 hover:text-red-600 text-2xl">×</button>
            </div>
        `).join('');
    }

    
    function renderProjects() {
        const container = document.getElementById('projectsList');
        container.innerHTML = projects.map((p, index) => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center">
                <div>
                    <p class="font-semibold">${p.title}</p>
                    <p class="text-xs text-gray-500">${p.sponsor || ''}</p>
                </div>
                <button onclick="deleteItem('projects', ${index})" class="text-red-500 hover:text-red-600 text-2xl">×</button>
            </div>
        `).join('');
    }

    function renderPartners() {
        const container = document.getElementById('partnersList');
        container.innerHTML = partners.map((p, index) => `
            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-3">
                    ${p.logo ? `<img src="${p.logo}" class="w-10 h-10 rounded-xl object-cover">` : ''}
                    <p class="font-semibold">${p.name}</p>
                </div>
                <button onclick="deleteItem('partners', ${index})" class="text-red-500 hover:text-red-600 text-2xl">×</button>
            </div>
        `).join('');
    }

    
// ====================== DELETE ITEM ======================
    function deleteItem(type, identifier) {
        if (!confirm('Delete this item?')) return;
    
        if (type === 'authors') {
            authors = authors.filter(a => a.id !== identifier && a.name !== identifier);
        } 
        else if (type === 'articles') {
            articles.splice(identifier, 1);
        } 
        else if (type === 'research') {
            research.splice(identifier, 1);
        } 
        else if (type === 'projects') {
            projects.splice(identifier, 1);
        } 
        else if (type === 'partners') {
            partners.splice(identifier, 1);
        }
    
        saveToJSON(`data/${type}.json`, 
            type === 'authors' ? authors :
            type === 'articles' ? articles :
            type === 'research' ? research :
            type === 'projects' ? projects : partners
        );
    
        renderAll();
    }

    // ====================== FORM SUBMIT LISTENERS ======================
    // Authors
    document.getElementById('authorForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newAuthor = {
            name: document.getElementById('authorName').value,
            photo: window.cropped_authorPhoto || null,
            bio: document.getElementById('authorBio').value,
            email: document.getElementById('authorEmail').value,
            linkedin: document.getElementById('authorLinkedIn').value,
            x: document.getElementById('authorX').value,
            website: document.getElementById('authorWebsite').value,
            id: Date.now().toString()
        };
        authors.unshift(newAuthor);
        await saveToJSON('data/authors.json', authors);
        alert('Author saved!');
        e.target.reset();
        delete window.cropped_authorPhoto;
        renderAuthors();
    });

    // Articles
    document.getElementById('articleForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newArticle = {
            title: document.getElementById('articleTitle').value,
            author: document.getElementById('articleAuthor').value,
            cover: window.cropped_articleCover || null,
            content: quillArticle.root.innerHTML,
            date: new Date().toISOString().slice(0,10)
        };
        articles.unshift(newArticle);
        await saveToJSON('data/articles.json', articles);
        alert('Article saved!');
        e.target.reset();
        document.getElementById('articleCoverPreview').classList.add('hidden');
        quillArticle.root.innerHTML = '';
        delete window.cropped_articleCover;
        renderArticles();
    });

    // Research 
    document.getElementById('researchForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newResearch = {
            title: document.getElementById('researchTitle').value,
            author: document.getElementById('researchAuthor').value,
            cover: window.cropped_researchCover || null,
            abstract: quillResearch.root.innerHTML,
            pdfBase64: window.currentResearchPDF || null,
            pdfThumb: document.getElementById('researchPDFThumb').src,
            date: new Date().toISOString().slice(0,10)
        };
        research.unshift(newResearch);
        await saveToJSON('data/research.json', research);
        alert('Research saved!');
        e.target.reset();
        document.getElementById('researchCoverPreview').classList.add('hidden');
        document.getElementById('researchPDFPreview').classList.add('hidden');
        quillResearch.root.innerHTML = '';
        delete window.cropped_researchCover;
        renderResearch();
    });

    // Projects 
    document.getElementById('projectForm').addEventListener('submit', async e => {
    e.preventDefault();
    const newProject = {
        title: document.getElementById('projectTitle').value,
        sponsor: document.getElementById('projectSponsor').value,
        content: quillProject.root.innerHTML,
        date: new Date().toISOString().slice(0,10)
    };
    projects.unshift(newProject);
    await saveToJSON('data/projects.json', projects);
    alert('Project saved!');
    e.target.reset();
    quillProject.root.innerHTML = '';
    renderProjects();
    });
    
    // Partners
    document.getElementById('partnerForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newPartner = {
            name: document.getElementById('partnerName').value,
            url: document.getElementById('partnerUrl').value,
            logo: window.cropped_partnerLogo || null
        };
        partners.unshift(newPartner);
        await saveToJSON('data/partners.json', partners);
        alert('Partner saved!');
        e.target.reset();
        delete window.cropped_partnerLogo;
        renderPartners();
    });


    

    // ====================== ON LOAD ======================
    window.onload = () => {
        if (localStorage.getItem('enlilAdminLoggedIn') === 'true') {
            isLoggedIn = true;
            document.getElementById('loginScreen').classList.add('hidden');
        }

        initEditors();
        loadFromFiles();

        // Crop listeners
        document.getElementById('authorPhoto').addEventListener('change', e => handleImageSelect(e, 'authorPhoto'));
        document.getElementById('articleCover').addEventListener('change', e => handleImageSelect(e, 'articleCover'));
        document.getElementById('researchCover').addEventListener('change', e => handleImageSelect(e, 'researchCover'));
        document.getElementById('partnerLogo').addEventListener('change', e => handleImageSelect(e, 'partnerLogo'));

        // ====================== FILE TO BASE64 HELPER ======================
    function fileToBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

// ====================== RESEARCH PDF UPLOAD (thumbnail + base64) ======================
    document.getElementById('researchPDF').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
    
        // Create PDF thumbnail
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 1.5});
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
    
        document.getElementById('researchPDFThumb').src = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('researchPDFPreview').classList.remove('hidden');
    
        // Store PDF as base64 for later saving
        window.currentResearchPDF = await fileToBase64(file);
    });
    };
</script>
