<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlil Center - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .ql-editor { min-height: 420px; font-size: 1.1rem; line-height: 1.7; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-white shadow-2xl p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-12">
            <i class="fa-solid fa-leaf text-4xl text-emerald-600"></i>
            <h1 class="text-3xl font-semibold">Enlil Center</h1>
        </div>
        <nav class="flex-1 space-y-1">
            <button onclick="switchTab(0)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg tab-active">👤 Authors</button>
            <button onclick="switchTab(1)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📰 Articles & News</button>
            <button onclick="switchTab(2)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📚 Research & Reports</button>
            <button onclick="switchTab(3)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">📋 Projects</button>
            <button onclick="switchTab(4)" class="tab-button w-full text-left px-6 py-4 rounded-2xl hover:bg-emerald-50 flex items-center gap-3 text-lg">🤝 Partners & Sponsors</button>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10 overflow-auto">

        <!-- Authors -->
        <div id="tab0" class="tab-content">
            <h2 class="text-3xl font-semibold mb-8">Authors</h2>
            <form id="authorForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="block text-sm font-medium mb-2">Full Name</label><input type="text" id="authorName" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" required></div>
                    <div><label class="block text-sm font-medium mb-2">Photo</label><input type="file" id="authorPhoto" accept="image/*" class="w-full"></div>
                </div>
                <div class="mt-6"><label class="block text-sm font-medium mb-2">Bio</label><textarea id="authorBio" rows="4" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></textarea></div>
                <div class="grid grid-cols-3 gap-6 mt-6">
                    <div><label class="block text-sm font-medium mb-2">Email</label><input type="email" id="authorEmail" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                    <div><label class="block text-sm font-medium mb-2">LinkedIn</label><input type="url" id="authorLinkedIn" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                    <div><label class="block text-sm font-medium mb-2">X (Twitter)</label><input type="url" id="authorX" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                </div>
                <div class="mt-6"><label class="block text-sm font-medium mb-2">Website</label><input type="url" id="authorWebsite" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Author</button>
            </form>
            <div id="authorsList"></div>
        </div>

        <!-- Articles & News -->
        <div id="tab1" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Articles & News</h2>
            <form id="articleForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <input type="text" id="articleTitle" placeholder="Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <select id="articleAuthor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6"></select>
                <input type="file" id="articleCover" accept="image/*" class="mb-6">
                <div id="articleCoverPreview" class="mt-4 hidden"><img id="articlePreviewImg" class="max-h-64 rounded-2xl"></div>
                <div id="articleEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Article</button>
            </form>
            <div id="articlesList"></div>
        </div>

        <!-- Research & Reports -->
        <div id="tab2" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Research & Reports</h2>
            <form id="researchForm" class="bg-white p-8 rounded-3xl shadow mb-10">
                <input type="text" id="researchTitle" placeholder="Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <select id="researchAuthor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6"></select>
                <input type="file" id="researchCover" accept="image/*" class="mb-6">
                <div id="researchCoverPreview" class="mt-4 hidden"><img id="researchPreviewImg" class="max-h-64 rounded-2xl"></div>
                <input type="file" id="researchPDF" accept="application/pdf" class="mb-6">
                <div id="researchPDFPreview" class="mt-4 hidden"><img id="researchPDFThumb" class="max-h-48 rounded-2xl"></div>
                <div id="researchEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Research</button>
            </form>
            <div id="researchList"></div>
        </div>

        <!-- Projects -->
        <div id="tab3" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Projects</h2>
            <form id="projectForm" class="bg-white p-8 rounded-3xl shadow">
                <input type="text" id="projectTitle" placeholder="Project Title" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <input type="text" id="projectSponsor" placeholder="Funded by / Sponsor" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <div id="projectEditor" class="border border-gray-300 rounded-3xl"></div>
                <button type="submit" class="mt-10 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Project</button>
            </form>
            <div id="projectsList"></div>
        </div>

        <!-- Partners & Sponsors -->
        <div id="tab4" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-8">Partners & Sponsors</h2>
            <form id="partnerForm" class="bg-white p-8 rounded-3xl shadow">
                <input type="text" id="partnerName" placeholder="Organization Name" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required>
                <input type="url" id="partnerUrl" placeholder="Website URL" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <input type="file" id="partnerLogo" accept="image/*" class="mb-6">
                <button type="submit" class="mt-8 w-full bg-emerald-600 text-white py-5 rounded-3xl font-medium">Save Partner</button>
            </form>
            <div id="partnersList"></div>
        </div>
    </div>
</div>

<script>
    let quillArticle, quillResearch, quillProject;
    let articles = [], research = [], projects = [], partners = [], authors = [];
   
    // ====================== LOAD DATA FROM FILES ======================
    async function loadFromFiles() {
        try {
            const [aRes, rRes, pRes, prRes, paRes] = await Promise.all([
                fetch('data/authors.json').catch(() => ({json: () => []})),
                fetch('data/articles.json').catch(() => ({json: () => []})),
                fetch('data/research.json').catch(() => ({json: () => []})),
                fetch('data/projects.json').catch(() => ({json: () => []})),
                fetch('data/partners.json').catch(() => ({json: () => []}))
            ]);
    
            authors = await aRes.json() || [];
            articles = await rRes.json() || [];
            research = await pRes.json() || [];
            projects = await prRes.json() || [];
            partners = await paRes.json() || [];
        } catch(e) {
            console.log("First time run - no data yet");
        }
    renderAll();
}

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab' + n).classList.remove('hidden');
    }

    function initEditors() {
        quillArticle = new Quill('#articleEditor', { theme: 'snow', modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] } });
        quillResearch = new Quill('#researchEditor', { theme: 'snow', modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] } });
        quillProject = new Quill('#projectEditor', { theme: 'snow', modules: { toolbar: [['bold','italic','underline','link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image'], ['clean']] } });
    }

    // Preview cover images
    function setupPreview(inputId, previewId, imgId) {
        document.getElementById(inputId).addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById(imgId).src = ev.target.result;
                    document.getElementById(previewId).classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // PDF thumbnail for research
    document.getElementById('researchPDF').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 1.5});
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        document.getElementById('researchPDFThumb').src = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('researchPDFPreview').classList.remove('hidden');
        window.currentResearchPDF = await fileToBase64(file);
    });

    function fileToBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    // Save functions
    document.getElementById('articleForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newArticle = {
            title: document.getElementById('articleTitle').value,
            author: document.getElementById('articleAuthor').value,
            cover: document.getElementById('articleCoverPreview').classList.contains('hidden') ? null : document.getElementById('articlePreviewImg').src,
            content: quillArticle.root.innerHTML,
            date: new Date().toISOString().slice(0,10)
        };
        articles.unshift(newArticle);
        await saveToJSON('data/articles.json', articles);
        alert('Article saved!');
        e.target.reset();
        document.getElementById('articleCoverPreview').classList.add('hidden');
        quillArticle.root.innerHTML = '';
        renderArticles();
    });

    document.getElementById('researchForm').addEventListener('submit', async e => {
        e.preventDefault();
        const newResearch = {
            title: document.getElementById('researchTitle').value,
            author: document.getElementById('researchAuthor').value,
            cover: document.getElementById('researchCoverPreview').classList.contains('hidden') ? null : document.getElementById('researchPreviewImg').src,
            abstract: quillResearch.root.innerHTML,
            pdfBase64: window.currentResearchPDF || null,
            pdfThumb: document.getElementById('researchPDFThumb').src,
            date: new Date().toISOString().slice(0,10)
        };
        research.unshift(newResearch);
        await saveToJSON('data/research.json', research);
        alert('Research saved!');
        e.target.reset();
        document.getElementById('researchCoverPreview').classList.add('hidden');
        document.getElementById('researchPDFPreview').classList.add('hidden');
        quillResearch.root.innerHTML = '';
        renderResearch();
    });


    async function saveToJSON(filename, data) {
        try {
            await fetch(filename, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        } catch(e) {
            console.error("Save failed for", filename);
        }
    }


     // ====================== RENDER FUNCTIONS ======================
    function renderAll() {
        renderAuthors();
        renderArticles();
        renderResearch();
        renderProjects();
        renderPartners();
    }

    function renderAuthors() {
        const container = document.getElementById('authorsList');
        container.innerHTML = authors.map(a => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    ${a.photo ? `<img src="${a.photo}" class="w-10 h-10 rounded-xl object-cover">` : ''}
                    <div>
                        <p class="font-semibold">${a.name}</p>
                        <p class="text-xs text-gray-500">${a.email || ''}</p>
                    </div>
                </div>
                <button onclick="deleteItem('authors', '${a.id || a.name}')" class="text-red-500 hover:text-red-600">×</button>
            </div>
        `).join('');
    }

    function renderArticles() {
        const container = document.getElementById('articlesList');
        container.innerHTML = articles.map(a => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between">
                <div>
                    <p class="font-semibold">${a.title}</p>
                    <p class="text-xs text-gray-500">By ${a.author || '—'}</p>
                </div>
                <button onclick="deleteItem('articles', ${articles.indexOf(a)})" class="text-red-500">×</button>
            </div>
        `).join('');
    }

    function renderResearch() {
        const container = document.getElementById('researchList');
        container.innerHTML = research.map(r => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between">
                <div>
                    <p class="font-semibold">${r.title}</p>
                    <p class="text-xs text-gray-500">By ${r.author || '—'}</p>
                </div>
                <button onclick="deleteItem('research', ${research.indexOf(r)})" class="text-red-500">×</button>
            </div>
        `).join('');
    }

    function renderProjects() {
        const container = document.getElementById('projectsList');
        container.innerHTML = projects.map(p => `
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between">
                <div>
                    <p class="font-semibold">${p.title}</p>
                    <p class="text-xs text-gray-500">${p.sponsor || ''}</p>
                </div>
                <button onclick="deleteItem('projects', ${projects.indexOf(p)})" class="text-red-500">×</button>
            </div>
        `).join('');
    }

    function renderPartners() {
        const container = document.getElementById('partnersList');
        container.innerHTML = partners.map(p => `
            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                <p class="font-semibold">${p.name}</p>
                <button onclick="deleteItem('partners', ${partners.indexOf(p)})" class="text-red-500">×</button>
            </div>
        `).join('');
    }

    function deleteItem(type, index) {
        if (confirm('Delete this item?')) {
            if (type === 'authors') authors.splice(index, 1);
            else if (type === 'articles') articles.splice(index, 1);
            else if (type === 'research') research.splice(index, 1);
            else if (type === 'projects') projects.splice(index, 1);
            else if (type === 'partners') partners.splice(index, 1);
            saveToJSON(`data/${type}.json`, window[type]);   // save immediately
            renderAll();
        }
    }

    window.onload = () => {
        initEditors();
        setupPreview('articleCover', 'articleCoverPreview', 'articlePreviewImg');
        setupPreview('researchCover', 'researchCoverPreview', 'researchPreviewImg');
        loadFromFiles();          // ← loads saved data
    };
   

</script>
</body>
</html>
